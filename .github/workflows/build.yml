name: MissMetal Build

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # --------------------------------------------------------------------------
  # Build
  # --------------------------------------------------------------------------
  build:
    name: "Build MissMetal Firmware"
    runs-on: ubuntu-latest
    container: lynkzinstruments/stm32-project-builder:latest

    steps:
        - name: Configure Git to avoid ownership warnings
          run: git config --global --add safe.directory '*'

        # ----------------------------------------------------------------------
        # Extract version from tag
        # ----------------------------------------------------------------------
        - name: Extract version from tag
          run: |
            TAG_NAME="${GITHUB_REF#refs/tags/v}"
            MAJOR=$(echo "$TAG_NAME" | cut -d. -f1)
            MINOR=$(echo "$TAG_NAME" | cut -d. -f2)
            PATCH=$(echo "$TAG_NAME" | cut -d. -f3)

            echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV
            echo "MAJOR=$MAJOR"       >> $GITHUB_ENV
            echo "MINOR=$MINOR"       >> $GITHUB_ENV
            echo "PATCH=$PATCH"       >> $GITHUB_ENV

        - name: Print extracted version
          run: echo "Tag Name: ${{ env.TAG_NAME }}"

        # ----------------------------------------------------------------------
        # Source checkout
        # ----------------------------------------------------------------------
        - name: Checkout repository and submodules
          uses: actions/checkout@v3
          with:
            submodules: recursive
            token: ${{ secrets.XAV_TOKEN }}

        # ----------------------------------------------------------------------
        # Firmware build
        # ----------------------------------------------------------------------
        - name: Configure and build firmware (Debug)
          run: |
            cmake --preset Debug \
              -DFW_VERSION_MAJOR=${{ env.MAJOR }} \
              -DFW_VERSION_MINOR=${{ env.MINOR }} \
              -DFW_VERSION_BUGFIX=${{ env.PATCH }}
            cmake --build --preset Debug

        # ----------------------------------------------------------------------
        # HEX generation
        # ----------------------------------------------------------------------
        - name: Generate HEX
          run: |
            OUT_NAME=MM_MB_1_v1_X_${{ env.TAG_NAME }}
            arm-none-eabi-objcopy -O ihex \
              build/Debug/MM_MB_1_v1_X-FW.elf \
              ${OUT_NAME}.hex
            echo "OUT_NAME=$OUT_NAME" >> $GITHUB_ENV

        # ----------------------------------------------------------------------
        # Upload artifacts
        # ----------------------------------------------------------------------
        - name: Upload build artifacts
          uses: actions/upload-artifact@v4
          with:
            name: MissMetal-${{ env.TAG_NAME }}
            path: ${{ env.OUT_NAME }}.hex

  # --------------------------------------------------------------------------
  # Release
  # --------------------------------------------------------------------------
  release:
    name: "Create GitHub Release"
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./release-files

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: true
          files: ./release-files/**/*
